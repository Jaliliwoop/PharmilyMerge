<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pharmily Merge</title>
    <style>
        :root { 
            --bg: #faf8ef; 
            --grid-bg: #bbada0; 
            --cell-bg: rgba(238, 228, 218, 0.35); 
            --text: #776e65; 
            --btn-bg: #8f7a66;
            /* The secret sauce for alignment */
            --grid-size: 400px;
            --grid-gap: 15px;
            --tile-size: calc((var(--grid-size) - (var(--grid-gap) * 5)) / 4);
        }
        
        /* Mobile override for the grid size */
        @media (max-width: 450px) {
            :root { --grid-size: 90vw; --grid-gap: 3vw; }
        }

        html, body { overflow: hidden; touch-action: none; width: 100%; height: 100%; margin: 0; position: fixed; }
        body { background: var(--bg); font-family: "Clear Sans", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); }
        
        .header { width: var(--grid-size); display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .score-container { background: #bbada0; padding: 10px 20px; border-radius: 6px; color: white; text-align: center; }
        .score-label { display: block; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .score-val { font-size: 22px; font-weight: bold; }

        .controls { width: var(--grid-size); display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .reset-btn { background: var(--btn-bg); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        #game-container { 
            position: relative; 
            width: var(--grid-size); 
            height: var(--grid-size); 
            background: var(--grid-bg); 
            border-radius: 6px; 
            padding: var(--grid-gap); 
            box-sizing: border-box; 
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: var(--grid-gap); width: 100%; height: 100%; }
        .grid-cell { background: var(--cell-bg); border-radius: 3px; }
        
        .tile-container { position: absolute; top: var(--grid-gap); left: var(--grid-gap); right: var(--grid-gap); bottom: var(--grid-gap); pointer-events: none; }
        
        .tile { 
            position: absolute; 
            width: var(--tile-size); 
            height: var(--tile-size); 
            border-radius: 3px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: calc(var(--tile-size) * 0.5); 
            font-weight: bold;
            transition: top 110ms ease-in-out, left 110ms ease-in-out; 
            z-index: 10;
        }
        
        .lvl-2 { background: #eee4da; } .lvl-4 { background: #ede0c8; }
        .lvl-8 { background: #f2b179; } .lvl-16 { background: #f59563; }
        .lvl-32 { background: #f67c5f; } .lvl-64 { background: #f65e3b; }
        .lvl-128 { background: #edcf72; box-shadow: 0 0 15px rgba(243, 215, 116, 0.4); }
        .lvl-256 { background: #edcc61; } .lvl-512 { background: #edc850; border: 2px solid #f59e0b; }

        .tile-new { animation: appear 200ms ease; }
        .tile-merged { z-index: 20; animation: pop 200ms ease; }

        @keyframes appear { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin: 0; font-size: 28px;">PharmilyMERGE</h1>
        <div class="score-container">
            <span class="score-label">Pharmily Score</span>
            <span id="score" class="score-val">0</span>
        </div>
    </div>

    <div class="controls">
        <button class="reset-btn" onclick="game.restart()">New Dispense</button>
    </div>
    
    <div id="game-container">
        <div class="grid">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="tile-container" id="tile-container"></div>
    </div>

<script>
class Tile {
    constructor(x, y, value) {
        this.x = x; this.y = y; this.value = value;
        this.element = this.createElement();
    }

    createElement() {
        const div = document.createElement('div');
        this.updatePosition(div);
        div.className = `tile lvl-${this.value} tile-new`;
        div.innerHTML = this.getIcon(this.value);
        document.getElementById('tile-container').appendChild(div);
        return div;
    }

    getIcon(val) {
        return {2:'💊', 4:'💉', 8:'🧪', 16:'📝', 32:'🏥', 64:'🏪', 128:'🏢', 256:'🇦🇺', 512:'🏆'}[val] || val;
    }

    updatePosition(el = this.element) {
        // Precise calculation including the gaps
        const offset = `calc(${this.x} * (var(--tile-size) + var(--grid-gap)))`;
        const topOffset = `calc(${this.y} * (var(--tile-size) + var(--grid-gap)))`;
        el.style.left = offset;
        el.style.top = topOffset;
    }

    updateValue(newVal) {
        this.value = newVal;
        this.element.className = `tile lvl-${this.value} tile-merged`;
        this.element.innerHTML = this.getIcon(this.value);
    }

    remove() {
        this.element.style.opacity = '0';
        const el = this.element;
        setTimeout(() => el.remove(), 110);
    }
}

class GameEngine {
    constructor() { this.restart(); this.setupInput(); }

    restart() {
        this.board = Array(4).fill().map(() => Array(4).fill(null));
        this.score = 0;
        document.getElementById('score').innerText = '0';
        document.getElementById('tile-container').innerHTML = '';
        this.addRandomTile(); this.addRandomTile();
    }

    addRandomTile() {
        let empty = [];
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(!this.board[r][c]) empty.push({r,c});
        if(empty.length) {
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            this.board[r][c] = new Tile(c, r, Math.random() < 0.9 ? 2 : 4);
        }
    }

    setupInput() {
        window.addEventListener('keydown', e => {
            const keyMap = { 'ArrowUp':'up', 'ArrowDown':'down', 'ArrowLeft':'left', 'ArrowRight':'right' };
            if(keyMap[e.key]) { e.preventDefault(); this.move(keyMap[e.key]); }
        });

        let startX, startY;
        window.addEventListener('touchstart', e => { 
            startX = e.touches[0].clientX; startY = e.touches[0].clientY; 
        }, {passive: false});

        window.addEventListener('touchend', e => {
            if (!startX || !startY) return;
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
                this.move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
            }
            startX = startY = null;
        }, {passive: false});
    }

    move(dir) {
        const vector = { 'up':{r:-1, c:0}, 'down':{r:1, c:0}, 'left':{r:0, c:-1}, 'right':{r:0, c:1} }[dir];
        let moved = false;
        const traverse = (v) => v === 1 ? [3,2,1,0] : [0,1,2,3];
        const merged = new Set();

        traverse(vector.r).forEach(r => {
            traverse(vector.c).forEach(c => {
                const tile = this.board[r][c];
                if(tile) {
                    let curR = r, curC = c;
                    while(true) {
                        let nR = curR + vector.r, nC = curC + vector.c;
                        if(nR<0 || nR>=4 || nC<0 || nC>=4) break;
                        const next = this.board[nR][nC];
                        if(!next) {
                            this.board[nR][nC] = tile; this.board[curR][curC] = null;
                            tile.y = nR; tile.x = nC; tile.updatePosition();
                            curR = nR; curC = nC; moved = true;
                        } else if(next.value === tile.value && !merged.has(`${nR},${nC}`)) {
                            this.score += tile.value * 2;
                            document.getElementById('score').innerText = this.score;
                            next.updateValue(tile.value * 2);
                            tile.y = nR; tile.x = nC; tile.updatePosition();
                            tile.remove(); this.board[curR][curC] = null;
                            merged.add(`${nR},${nC}`); moved = true; break;
                        } else break;
                    }
                }
            });
        });
        if(moved) setTimeout(() => this.addRandomTile(), 120);
    }
}

const game = new GameEngine();
</script>
</body>
</html>
